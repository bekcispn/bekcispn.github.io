<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Discord Sandık Seçim Sistemi</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            color: #f1f5f9;
        }
        .container { max-width: 1300px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .user-info {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-top: 1rem;
        }
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 1.8rem;
            margin-bottom: 2rem;
        }
        .voters-card, .chart-card, .sandik-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            padding: 1rem;
        }
        .card-header {
            background: rgba(0,0,0,0.3);
            padding: 0.8rem 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .voter-list {
            max-height: 400px;
            overflow-y: auto;
            padding: 0.5rem;
        }
        .voter-item {
            background: rgba(255,255,255,0.05);
            margin: 0.6rem 0;
            padding: 0.75rem 1rem;
            border-radius: 1.2rem;
            display: flex;
            justify-content: space-between;
        }
        .voter-name { display: flex; align-items: center; gap: 10px; font-weight: 500; }
        .voter-choice { background: #1e293b; padding: 0.25rem 0.9rem; border-radius: 40px; font-size: 0.8rem; }
        .percentage-stats { display: flex; gap: 1.5rem; margin: 1rem 0; justify-content: center; }
        .stat { background: #0f172a80; padding: 0.4rem 1rem; border-radius: 40px; font-weight: 600; }
        .canvas-container { height: 280px; margin-top: 1rem; }
        .btn-discord {
            background: #5865F2;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-vote {
            background: linear-gradient(105deg, #3b82f6, #8b5cf6);
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
            margin: 0.5rem;
        }
        .admin-panel, .sandik-panel {
            margin-top: 1rem;
            background: rgba(0,0,0,0.3);
            border-radius: 1rem;
            padding: 1rem;
        }
        .sandik-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .sandik-item {
            background: #0f172a;
            border-radius: 1rem;
            padding: 1rem;
            border-left: 4px solid #3b82f6;
        }
        .sandik-baslik {
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
        .sandik-durum {
            font-size: 0.8rem;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
        }
        .durum-acik { background: #22c55e; color: #0f172a; }
        .durum-kapali { background: #ef4444; }
        .btn-sandik {
            background: #475569;
            border: none;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .btn-sandik:disabled { opacity: 0.5; cursor: not-allowed; }
        .uyari { color: #facc15; font-size: 0.8rem; margin-top: 0.5rem; }
        @media (max-width: 800px) { .dashboard { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-vote-yea"></i> Sandık Seçim Sistemi</h1>
        <div id="userInfoArea" class="user-info">
            <i class="fab fa-discord"></i> <span id="userStatus">Giriş yapılmadı</span>
        </div>
    </div>
    <div id="mainContent"></div>
</div>

<script>
    // ------------------- KONFIGURASYON -------------------
    const CLIENT_ID = "1484602452845006899";
    const REDIRECT_URI = encodeURIComponent("https://bekcispn.github.io/secim.html");  // KENDİ ADRESİNLE DEĞİŞTİR

    // Adaylar
    const CANDIDATES = { A: "Eyriks (HALKIN ADAMI)", B: "LW (YOLDAŞ)" };

    // Sandık yapılandırması
    const SANDIKLAR = {
        1: ["1394143234275672196", "324111665912217600", "913861573855035412"],
        2: ["1459959385244700716", "1248992367780827208", "1269727968700137585"],
        3: ["1181989342634319915", "852876832549634048", "926104943813873715"],
        4: ["1396622278892196004", "1394737118613602364", "622842615137697803"],
        5: ["718497337684525146", "822896323912925205", "1390253020926972034"],
        6: ["951122732362399784", "999047005718446220", "1066152244845740042"],
        7: ["1080203490112057366", "1042045149468967012", "781607616140148756", "585891352454365204"]
    };
    // Tüm izinli ID'ler (sandıkta olmayan yok)
    const ALLOWED_USER_IDS = Object.values(SANDIKLAR).flat();

    // Admin ID (bekcispn)
    const ADMIN_ID = "718497337684525146";

    // Sandık durumları (localStorage)
    function getSandikDurumlari() {
        const stored = localStorage.getItem("sandikDurumlari");
        if (stored) return JSON.parse(stored);
        const defaultDurum = {};
        for (let i = 1; i <= Object.keys(SANDIKLAR).length; i++) defaultDurum[i] = false; // hepsi kapalı başlasın
        return defaultDurum;
    }
    function setSandikDurumlari(durum) {
        localStorage.setItem("sandikDurumlari", JSON.stringify(durum));
    }
    function sandikAcikMi(sandikNo) {
        const durum = getSandikDurumlari();
        return durum[sandikNo] === true;
    }
    function sandigiAc(sandikNo) {
        const durum = getSandikDurumlari();
        durum[sandikNo] = true;
        setSandikDurumlari(durum);
    }
    function sandigiKapat(sandikNo) {
        const durum = getSandikDurumlari();
        durum[sandikNo] = false;
        setSandikDurumlari(durum);
    }

    // Kullanıcının sandığını bul
    function getKullaniciSandik(userId) {
        for (let [no, uyeler] of Object.entries(SANDIKLAR)) {
            if (uyeler.includes(userId)) return parseInt(no);
        }
        return null;
    }

    // Oy yönetimi (localStorage)
    function getVotes() {
        const stored = localStorage.getItem("votes");
        if (stored) return JSON.parse(stored);
        return [];
    }
    function saveVotes(votes) {
        localStorage.setItem("votes", JSON.stringify(votes));
    }
    function addVote(userId, userName, choice) {
        let votes = getVotes();
        if (votes.some(v => v.userId === userId)) return false;
        votes.push({ userId, userName, choice, timestamp: Date.now() });
        saveVotes(votes);
        return true;
    }
    function hasVoted(userId) {
        return getVotes().some(v => v.userId === userId);
    }
    function getUserVote(userId) {
        return getVotes().find(v => v.userId === userId);
    }

    // İstatistik
    function computeStats() {
        const votes = getVotes();
        const countA = votes.filter(v => v.choice === "A").length;
        const countB = votes.filter(v => v.choice === "B").length;
        const total = votes.length;
        const percentA = total === 0 ? 0 : (countA / total) * 100;
        const percentB = total === 0 ? 0 : (countB / total) * 100;
        return { total, countA, countB, percentA, percentB };
    }

    // Grafik ve liste render
    let chart = null;
    function renderChart() {
        const stats = computeStats();
        const ctx = document.getElementById('voteChart').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: [CANDIDATES.A, CANDIDATES.B],
                datasets: [{
                    label: 'Oy Sayısı',
                    data: [stats.countA, stats.countB],
                    backgroundColor: ['#f97316', '#c084fc'],
                    borderRadius: 10,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: { legend: { labels: { color: '#e2e8f0' } } },
                scales: {
                    y: { beginAtZero: true, ticks: { stepSize: 1, color: '#cbd5e6' } },
                    x: { ticks: { color: '#f1f5f9' } }
                }
            }
        });
        document.getElementById('percentA').innerText = stats.percentA.toFixed(1);
        document.getElementById('percentB').innerText = stats.percentB.toFixed(1);
        document.getElementById('totalVotes').innerText = stats.total;
    }
    function renderVoterList() {
        const votes = getVotes();
        const container = document.getElementById('voterList');
        if (!container) return;
        if (votes.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:2rem;">Henüz oy yok</div>';
            return;
        }
        container.innerHTML = votes.map(v => `
            <div class="voter-item">
                <div class="voter-name"><i class="fab fa-discord"></i> ${escapeHtml(v.userName)}</div>
                <div class="voter-choice">${v.choice === 'A' ? CANDIDATES.A : CANDIDATES.B}</div>
            </div>
        `).join('');
    }
    function updateUI() {
        renderChart();
        renderVoterList();
    }

    // Discord Auth
    function getDiscordUser(callback) {
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const accessToken = params.get('access_token');
        if (!accessToken) { callback(null); return; }
        fetch('https://discord.com/api/users/@me', {
            headers: { Authorization: `Bearer ${accessToken}` }
        })
        .then(res => res.json())
        .then(user => { if (user.id) callback(user); else callback(null); })
        .catch(() => callback(null));
    }
    function loginWithDiscord() {
        const authUrl = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=identify`;
        window.location.href = authUrl;
    }
    function logout() {
        window.location.href = window.location.pathname;
    }

    // Admin paneli (sandık yönetimi)
    function renderAdminPanel() {
        const durumlar = getSandikDurumlari();
        let html = `<div class="sandik-panel"><h3><i class="fas fa-archive"></i> Sandık Yönetimi</h3>
        <div class="sandik-grid">`;
        for (let i = 1; i <= Object.keys(SANDIKLAR).length; i++) {
            const uyeSayisi = SANDIKLAR[i].length;
            const acik = durumlar[i];
            const yeterli = uyeSayisi >= 15;
            html += `
                <div class="sandik-item">
                    <div class="sandik-baslik">
                        <span><i class="fas fa-box"></i> Sandık ${i}</span>
                        <span class="sandik-durum ${acik ? 'durum-acik' : 'durum-kapali'}">${acik ? 'AÇIK' : 'KAPALI'}</span>
                    </div>
                    <div>👥 Üye sayısı: ${uyeSayisi}</div>
                    <div class="uyari">${!yeterli && uyeSayisi < 15 ? '⚠️ 15+ üye olmadan açılamaz' : ''}</div>
                    <button class="btn-sandik" data-sandik="${i}" data-durum="${acik}" ${!yeterli && !acik ? 'disabled' : ''}>
                        ${acik ? 'KAPAT' : 'AÇ'}
                    </button>
                </div>
            `;
        }
        html += `</div></div>`;
        document.getElementById('adminPanel').innerHTML = html;
        // buton olayları
        document.querySelectorAll('.btn-sandik').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const sandik = parseInt(btn.dataset.sandik);
                const suAnAcik = btn.dataset.durum === 'true';
                if (suAnAcik) {
                    sandigiKapat(sandik);
                } else {
                    const uyeSayisi = SANDIKLAR[sandik].length;
                    if (uyeSayisi >= 15) {
                        sandigiAc(sandik);
                    } else {
                        alert(`Sandık ${sandik} için en az 15 üye gerekli (şu an ${uyeSayisi})`);
                        return;
                    }
                }
                // sayfayı yenile (aynı kullanıcı ile)
                const currentUser = window.currentDiscordUser;
                if (currentUser) showVotingPanel(currentUser);
            });
        });
    }

    // Ana oy verme paneli
    function showVotingPanel(user) {
        window.currentDiscordUser = user;
        const sandikNo = getKullaniciSandik(user.id);
        if (!sandikNo) {
            document.getElementById('mainContent').innerHTML = `<div class="login-panel"><h2>Hata</h2><p>Bu kullanıcı herhangi bir sandıkta bulunamadı.</p></div>`;
            return;
        }
        const sandikAcik = sandikAcikMi(sandikNo);
        const alreadyVoted = hasVoted(user.id);
        const userVote = alreadyVoted ? getUserVote(user.id) : null;

        let oyKullanmaHtml = '';
        if (alreadyVoted) {
            oyKullanmaHtml = `<div style="margin:1rem; background:#2d2f36; padding:0.5rem; border-radius:2rem;">✅ Oy kullandınız: ${userVote.choice === 'A' ? CANDIDATES.A : CANDIDATES.B} (değiştirilemez)</div>`;
        } else if (!sandikAcik) {
            oyKullanmaHtml = `<div style="margin:1rem; background:#ef4444; padding:0.5rem; border-radius:2rem;">🔒 Sandık ${sandikNo} henüz açılmadı. Oy kullanamazsınız.</div>`;
        } else {
            oyKullanmaHtml = `
                <div style="margin: 1rem 0;">
                    <button id="voteA" class="btn-vote"><i class="fas fa-fire"></i> ${CANDIDATES.A}</button>
                    <button id="voteB" class="btn-vote"><i class="fas fa-moon"></i> ${CANDIDATES.B}</button>
                </div>
            `;
        }

        const html = `
            <div class="dashboard">
                <div class="voters-card">
                    <div class="card-header">
                        <h2><i class="fas fa-users"></i> Oy Verenler (<span id="totalVotes">0</span>)</h2>
                    </div>
                    <div id="voterList" class="voter-list"></div>
                </div>
                <div class="chart-card">
                    <h3><i class="fas fa-chart-simple"></i> Anlık Oranlar</h3>
                    <div class="percentage-stats">
                        <div class="stat">${CANDIDATES.A}: <span id="percentA">0</span>%</div>
                        <div class="stat">${CANDIDATES.B}: <span id="percentB">0</span>%</div>
                    </div>
                    <div class="canvas-container">
                        <canvas id="voteChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="login-panel">
                <div><i class="fab fa-discord"></i> <strong>${escapeHtml(user.username)}#${user.discriminator}</strong> (Sandık ${sandikNo})</div>
                ${oyKullanmaHtml}
                <button onclick="logout()" class="btn-discord" style="background:#475569;"><i class="fas fa-sign-out-alt"></i> Çıkış Yap</button>
            </div>
            <div id="adminPanel" class="admin-panel" style="display: ${user.id === ADMIN_ID ? 'block' : 'none'};"></div>
            <div class="admin-panel">
                <button id="exportBtn" class="btn-discord" style="background:#3b82f6;"><i class="fas fa-download"></i> Yedek Al</button>
                <button id="importBtn" class="btn-discord" style="background:#10b981;"><i class="fas fa-upload"></i> Yedek Yükle</button>
                <button id="resetBtn" class="btn-discord" style="background:#ef4444;"><i class="fas fa-trash"></i> Tüm Oyları Sıfırla (Admin)</button>
            </div>
        `;
        document.getElementById('mainContent').innerHTML = html;
        updateUI();

        if (!alreadyVoted && sandikAcik) {
            document.getElementById('voteA')?.addEventListener('click', () => {
                if (addVote(user.id, user.username, "A")) showVotingPanel(user);
            });
            document.getElementById('voteB')?.addEventListener('click', () => {
                if (addVote(user.id, user.username, "B")) showVotingPanel(user);
            });
        }

        // admin paneli render et (eğer adminse)
        if (user.id === ADMIN_ID) renderAdminPanel();

        // yedekleme vb.
        document.getElementById('exportBtn')?.addEventListener('click', () => {
            const data = { votes: getVotes(), sandikDurumlari: getSandikDurumlari() };
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `secim_yedek_${new Date().toISOString()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        });
        document.getElementById('importBtn')?.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'application/json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = ev => {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        if (imported.votes && Array.isArray(imported.votes)) saveVotes(imported.votes);
                        if (imported.sandikDurumlari) setSandikDurumlari(imported.sandikDurumlari);
                        showVotingPanel(user);
                        alert("Yedek başarıyla yüklendi!");
                    } catch { alert("Geçersiz dosya formatı"); }
                };
                reader.readAsText(file);
            };
            input.click();
        });
        document.getElementById('resetBtn')?.addEventListener('click', () => {
            if (confirm("TÜM OYLAR SİLİNECEK! Emin misiniz?")) {
                saveVotes([]);
                showVotingPanel(user);
            }
        });
    }

    function showLoginScreen() {
        document.getElementById('mainContent').innerHTML = `
            <div class="login-panel">
                <h2><i class="fab fa-discord"></i> Discord ile Giriş Yap</h2>
                <p style="margin: 1rem 0;">Sadece sandık üyeleri oy kullanabilir.</p>
                <button onclick="loginWithDiscord()" class="btn-discord"><i class="fab fa-discord"></i> Discord ile Giriş</button>
            </div>
        `;
    }
    function showUnauthorized() {
        document.getElementById('mainContent').innerHTML = `
            <div class="login-panel">
                <i class="fas fa-ban" style="font-size:3rem; color:#ef4444;"></i>
                <h2>Erişim Engellendi</h2>
                <p>Bu sunucunun üyesi değilsiniz veya izin verilen listede yoksunuz.</p>
                <button onclick="logout()" class="btn-discord">Tekrar Dene</button>
            </div>
        `;
    }

    function init() {
        getDiscordUser(user => {
            if (!user) { showLoginScreen(); return; }
            if (!ALLOWED_USER_IDS.includes(user.id)) { showUnauthorized(); return; }
            document.getElementById('userStatus').innerHTML = `<i class="fab fa-discord"></i> ${escapeHtml(user.username)}#${user.discriminator}`;
            showVotingPanel(user);
        });
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
    }

    init();
</script>
</body>
</html>
