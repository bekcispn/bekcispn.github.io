<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sandıklı Seçim Sistemi</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            color: #f1f5f9;
        }
        .container { max-width: 1300px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .user-info {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-top: 1rem;
        }
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 1.8rem;
            margin-bottom: 2rem;
        }
        .voters-card, .chart-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            padding: 1rem;
        }
        .card-header {
            background: rgba(0,0,0,0.3);
            padding: 0.8rem 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .voter-list {
            max-height: 400px;
            overflow-y: auto;
            padding: 0.5rem;
        }
        .voter-item {
            background: rgba(255,255,255,0.05);
            margin: 0.6rem 0;
            padding: 0.75rem 1rem;
            border-radius: 1.2rem;
            display: flex;
            justify-content: space-between;
        }
        .voter-name { display: flex; align-items: center; gap: 10px; font-weight: 500; }
        .percentage-stats { display: flex; gap: 1.5rem; margin: 1rem 0; justify-content: center; }
        .stat { background: #0f172a80; padding: 0.4rem 1rem; border-radius: 40px; font-weight: 600; }
        .canvas-container { height: 280px; margin-top: 1rem; }
        .btn-discord {
            background: #5865F2;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-vote {
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
            margin: 0.5rem;
        }
        .btn-vote-A { background: #ef4444; color: white; }
        .btn-vote-B { background: #1e3a8a; color: white; }
        .admin-panel, .sandik-panel {
            margin-top: 1rem;
            background: rgba(0,0,0,0.3);
            border-radius: 1rem;
            padding: 1rem;
        }
        .sandik-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .sandik-item {
            background: #0f172a;
            border-radius: 1rem;
            padding: 1rem;
            border-left: 4px solid #3b82f6;
        }
        .sandik-baslik {
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
        .sandik-durum {
            font-size: 0.8rem;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
        }
        .durum-aciklandi { background: #22c55e; color: #0f172a; }
        .durum-bekliyor { background: #facc15; color: #0f172a; }
        .countdown { font-family: monospace; font-size: 1.1rem; background: #0f172a; padding: 0.2rem 0.6rem; border-radius: 20px; display: inline-block; }
        .btn-danger { background: #dc2626; }
        @media (max-width: 800px) { .dashboard { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-vote-yea"></i> Sandıklı Seçim Sistemi</h1>
        <div id="userInfoArea" class="user-info">
            <i class="fab fa-discord"></i> <span id="userStatus">Giriş yapılmadı</span>
            <span id="sandikNoDisplay" style="background:#475569; padding:0.2rem 0.6rem; border-radius:20px;"></span>
        </div>
    </div>
    <div id="mainContent"></div>
</div>

<script>
    // ------------------- KONFIGURASYON -------------------
    const CLIENT_ID = "1484602452845006899";
    const REDIRECT_URI = encodeURIComponent("https://bekcispn.github.io/secim.html");  // KENDİ ADRESİNLE DEĞİŞTİR

    const CANDIDATES = { A: "EYRIKS", B: "LW" };

    const SANDIKLAR = {
        1: ["1394143234275672196", "324111665912217600", "913861573855035412"],
        2: ["1459959385244700716", "1248992367780827208", "1269727968700137585"],
        3: ["1181989342634319915", "852876832549634048", "926104943813873715"],
        4: ["1396622278892196004", "1394737118613602364", "622842615137697803"],
        5: ["718497337684525146", "822896323912925205", "1390253020926972034"],
        6: ["951122732362399784", "999047005718446220", "1066152244845740042"],
        7: ["1080203490112057366", "1042045149468967012", "781607616140148756", "585891352454365204"]
    };
    const ALLOWED_USER_IDS = Object.values(SANDIKLAR).flat();
    const ADMIN_ID = "1390253020926972034";   // bekcispn'in doğru ID'si

    // ------------------- VERİ YÖNETİMİ -------------------
    function getAllVotes() {
        const stored = localStorage.getItem("allVotes");
        return stored ? JSON.parse(stored) : [];
    }
    function saveAllVotes(votes) {
        localStorage.setItem("allVotes", JSON.stringify(votes));
    }
    function addVote(userId, userName, choice, sandıkNo) {
        let votes = getAllVotes();
        if (votes.some(v => v.userId === userId)) return false;
        votes.push({ userId, userName, choice, sandıkNo, timestamp: Date.now() });
        saveAllVotes(votes);
        return true;
    }
    function deleteVote(userId) {
        let votes = getAllVotes();
        votes = votes.filter(v => v.userId !== userId);
        saveAllVotes(votes);
    }
    function hasVoted(userId) {
        return getAllVotes().some(v => v.userId === userId);
    }
    function getUserVote(userId) {
        return getAllVotes().find(v => v.userId === userId);
    }

    function getRevealedSandiklar() {
        const stored = localStorage.getItem("revealedSandiklar");
        return stored ? JSON.parse(stored) : [];
    }
    function setRevealedSandiklar(revealed) {
        localStorage.setItem("revealedSandiklar", JSON.stringify(revealed));
    }
    function revealSandik(sandikNo) {
        let revealed = getRevealedSandiklar();
        if (!revealed.includes(sandikNo)) {
            revealed.push(sandikNo);
            setRevealedSandiklar(revealed);
        }
    }

    function getCountingStarted() {
        return localStorage.getItem("countingStarted") === "true";
    }
    function setCountingStarted(started) {
        localStorage.setItem("countingStarted", started);
    }

    function getRevealedStats() {
        const allVotes = getAllVotes();
        const revealed = getRevealedSandiklar();
        const filtered = allVotes.filter(v => revealed.includes(v.sandıkNo));
        const countA = filtered.filter(v => v.choice === "A").length;
        const countB = filtered.filter(v => v.choice === "B").length;
        const total = filtered.length;
        const percentA = total === 0 ? 0 : (countA / total) * 100;
        const percentB = total === 0 ? 0 : (countB / total) * 100;
        return { total, countA, countB, percentA, percentB };
    }

    function getTotalVotesCount() {
        return getAllVotes().length;
    }

    function getKullaniciSandik(userId) {
        for (let [no, uyeler] of Object.entries(SANDIKLAR)) {
            if (uyeler.includes(userId)) return parseInt(no);
        }
        return null;
    }

    // ------------------- GRAFİK VE LİSTE -------------------
    let chart = null;
    function renderChart() {
        const stats = getRevealedStats();
        const ctx = document.getElementById('voteChart').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: [CANDIDATES.A, CANDIDATES.B],
                datasets: [{
                    label: 'Açıklanan Oy Sayısı',
                    data: [stats.countA, stats.countB],
                    backgroundColor: ['#ef4444', '#1e3a8a'],
                    borderRadius: 10,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: { legend: { labels: { color: '#e2e8f0' } } },
                scales: {
                    y: { beginAtZero: true, ticks: { stepSize: 1, color: '#cbd5e6' } },
                    x: { ticks: { color: '#f1f5f9' } }
                }
            }
        });
        document.getElementById('percentA').innerText = stats.percentA.toFixed(1);
        document.getElementById('percentB').innerText = stats.percentB.toFixed(1);
        document.getElementById('totalRevealedVotes').innerText = stats.total;
    }

    function renderVoterList() {
        const votes = getAllVotes();
        const container = document.getElementById('voterList');
        if (!container) return;
        if (votes.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:2rem;">Henüz oy yok</div>';
            return;
        }
        container.innerHTML = votes.map(v => `
            <div class="voter-item">
                <div class="voter-name"><i class="fab fa-discord"></i> ${escapeHtml(v.userName)}</div>
                <div><i class="fas fa-check-circle" style="color:#22c55e;"></i> Oy verdi</div>
            </div>
        `).join('');
    }

    function updateUI() {
        renderChart();
        renderVoterList();
        const currentUser = window.currentDiscordUser;
        if (currentUser && currentUser.id === ADMIN_ID) renderAdminPanel(currentUser);
        if (currentUser) {
            const sandikNo = getKullaniciSandik(currentUser.id);
            document.getElementById('sandikNoDisplay').innerHTML = sandikNo ? `🏠 Sandık ${sandikNo}` : '';
        }
    }

    // ------------------- SAYIM ZAMANLAYICI -------------------
    let revealTimer = null;
    function stopRevealTimer() {
        if (revealTimer) { clearTimeout(revealTimer); revealTimer = null; }
    }
    function startRevealSequence() {
        const sandikNos = Object.keys(SANDIKLAR).map(Number).sort((a,b)=>a-b);
        let index = 0;
        const revealed = getRevealedSandiklar();
        while (index < sandikNos.length && revealed.includes(sandikNos[index])) index++;
        if (index >= sandikNos.length) return;
        function revealNext() {
            if (index >= sandikNos.length) return;
            revealSandik(sandikNos[index]);
            updateUI();
            index++;
            if (index < sandikNos.length) {
                revealTimer = setTimeout(revealNext, 120000);
                startCountdownDisplay(120);
            } else {
                revealTimer = null;
                const cd = document.getElementById('countdownDisplay');
                if (cd) cd.innerHTML = '';
            }
        }
        revealNext();
    }
    function startCountdownDisplay(secondsLeft) {
        const countdownSpan = document.getElementById('countdownDisplay');
        if (!countdownSpan) return;
        const interval = setInterval(() => {
            if (!countdownSpan || getRevealedSandiklar().length === Object.keys(SANDIKLAR).length) {
                clearInterval(interval);
                return;
            }
            const mins = Math.floor(secondsLeft / 60);
            const secs = secondsLeft % 60;
            countdownSpan.innerHTML = `⏳ Sonraki sandık: ${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            if (secondsLeft <= 0) clearInterval(interval);
            secondsLeft--;
        }, 1000);
    }

    // ------------------- ADMIN PANELİ -------------------
    function renderAdminPanel(user) {
        const countingStarted = getCountingStarted();
        const totalVotes = getTotalVotesCount();
        const sandikNos = Object.keys(SANDIKLAR).map(Number).sort((a,b)=>a-b);
        const revealed = getRevealedSandiklar();

        let sandikHtml = `<div class="sandik-panel"><h3><i class="fas fa-archive"></i> Sandık Durumu</h3><div class="sandik-grid">`;
        for (let no of sandikNos) {
            const aciklandi = revealed.includes(no);
            sandikHtml += `
                <div class="sandik-item">
                    <div class="sandik-baslik">
                        <span><i class="fas fa-box"></i> Sandık ${no}</span>
                        <span class="sandik-durum ${aciklandi ? 'durum-aciklandi' : 'durum-bekliyor'}">${aciklandi ? 'AÇIKLANDI' : 'BEKLİYOR'}</span>
                    </div>
                    <div>👥 Üye sayısı: ${SANDIKLAR[no].length}</div>
                </div>
            `;
        }
        sandikHtml += `</div></div>`;

        let startButtonHtml = '';
        if (!countingStarted) {
            startButtonHtml = `<button id="startCountingBtn" class="btn-discord" style="background:#10b981;"><i class="fas fa-play"></i> Sayımı Başlat (Toplam ${totalVotes} oy)</button>`;
        } else {
            startButtonHtml = `<div><i class="fas fa-chart-line"></i> Sayım başladı. Sandıklar sırayla açıklanıyor.</div>`;
        }

        // Admin'in kendi oyu için sil/değiştir butonları
        const myVote = getUserVote(user.id);
        let myVoteHtml = '';
        if (!countingStarted) {
            if (myVote) {
                myVoteHtml = `
                    <div style="margin-top: 1rem; padding: 0.8rem; background: #1e293b; border-radius: 1rem;">
                        <strong>Kendi Oyunuz:</strong> ${myVote.choice === 'A' ? CANDIDATES.A : CANDIDATES.B} için oy verdiniz.
                        <div style="margin-top: 0.5rem;">
                            <button id="deleteMyVoteBtn" class="btn-discord" style="background:#dc2626;"><i class="fas fa-trash"></i> Oyumu Sil</button>
                            <button id="changeMyVoteToA" class="btn-vote btn-vote-A" style="padding:0.4rem 1rem;">${CANDIDATES.A} ile Değiştir</button>
                            <button id="changeMyVoteToB" class="btn-vote btn-vote-B" style="padding:0.4rem 1rem;">${CANDIDATES.B} ile Değiştir</button>
                        </div>
                    </div>
                `;
            } else {
                myVoteHtml = `<div style="margin-top: 1rem; padding: 0.8rem; background: #1e293b; border-radius: 1rem;">Henüz oy kullanmadınız.</div>`;
            }
        }

        const adminHtml = `
            <div class="admin-panel">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                    <h3><i class="fas fa-user-shield"></i> Admin Kontrol Paneli</h3>
                    <div id="countdownDisplay" class="countdown"></div>
                </div>
                ${startButtonHtml}
                ${myVoteHtml}
                <div style="margin-top: 1rem;">
                    <button id="exportBtn" class="btn-discord" style="background:#3b82f6;"><i class="fas fa-download"></i> Yedek Al</button>
                    <button id="importBtn" class="btn-discord" style="background:#10b981;"><i class="fas fa-upload"></i> Yedek Yükle</button>
                </div>
                ${sandikHtml}
            </div>
        `;
        document.getElementById('adminPanel').innerHTML = adminHtml;

        // Sayım başlat
        document.getElementById('startCountingBtn')?.addEventListener('click', () => {
            if (getCountingStarted()) return;
            setCountingStarted(true);
            stopRevealTimer();
            setRevealedSandiklar([]);
            startRevealSequence();
            if (user) renderAdminPanel(user);
            updateUI();
        });

        // Admin kendi oyunu sil
        document.getElementById('deleteMyVoteBtn')?.addEventListener('click', () => {
            if (getCountingStarted()) { alert("Sayım başladı, oy değiştirilemez!"); return; }
            if (confirm("Kendi oyunuzu silmek istediğinize emin misiniz?")) {
                deleteVote(user.id);
                if (user) renderAdminPanel(user);
                updateUI();
            }
        });
        document.getElementById('changeMyVoteToA')?.addEventListener('click', () => {
            if (getCountingStarted()) { alert("Sayım başladı, oy değiştirilemez!"); return; }
            const sandikNo = getKullaniciSandik(user.id);
            deleteVote(user.id);
            addVote(user.id, user.username, "A", sandikNo);
            if (user) renderAdminPanel(user);
            updateUI();
        });
        document.getElementById('changeMyVoteToB')?.addEventListener('click', () => {
            if (getCountingStarted()) { alert("Sayım başladı, oy değiştirilemez!"); return; }
            const sandikNo = getKullaniciSandik(user.id);
            deleteVote(user.id);
            addVote(user.id, user.username, "B", sandikNo);
            if (user) renderAdminPanel(user);
            updateUI();
        });

        document.getElementById('exportBtn')?.addEventListener('click', () => {
            const data = {
                allVotes: getAllVotes(),
                revealedSandiklar: getRevealedSandiklar(),
                countingStarted: getCountingStarted()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `secim_yedek_${new Date().toISOString()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        });
        document.getElementById('importBtn')?.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'application/json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = ev => {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        if (imported.allVotes && Array.isArray(imported.allVotes)) saveAllVotes(imported.allVotes);
                        if (imported.revealedSandiklar) setRevealedSandiklar(imported.revealedSandiklar);
                        if (typeof imported.countingStarted === 'boolean') setCountingStarted(imported.countingStarted);
                        if (getCountingStarted()) {
                            stopRevealTimer();
                            startRevealSequence();
                        }
                        updateUI();
                        if (user) renderAdminPanel(user);
                        alert("Yedek başarıyla yüklendi!");
                    } catch { alert("Geçersiz dosya formatı"); }
                };
                reader.readAsText(file);
            };
            input.click();
        });
    }

    // ------------------- OY KULLANMA PANELİ -------------------
    function showVotingPanel(user) {
        window.currentDiscordUser = user;
        const sandikNo = getKullaniciSandik(user.id);
        if (!sandikNo) {
            document.getElementById('mainContent').innerHTML = `<div class="login-panel"><h2>Hata</h2><p>Bu kullanıcı herhangi bir sandıkta bulunamadı.</p></div>`;
            return;
        }
        const countingStarted = getCountingStarted();
        const alreadyVoted = hasVoted(user.id);

        let oyKullanmaHtml = '';
        if (alreadyVoted) {
            oyKullanmaHtml = `<div style="margin:1rem; background:#2d2f36; padding:0.5rem; border-radius:2rem;">✅ Oy kullandınız (sonuçlar sayım başlayınca açıklanacak).</div>`;
        } else if (countingStarted) {
            oyKullanmaHtml = `<div style="margin:1rem; background:#ef4444; padding:0.5rem; border-radius:2rem;">🔒 Sayım başladı, artık oy kullanamazsınız.</div>`;
        } else {
            oyKullanmaHtml = `
                <div style="margin: 1rem 0;">
                    <button id="voteA" class="btn-vote btn-vote-A"><i class="fas fa-fire"></i> ${CANDIDATES.A}</button>
                    <button id="voteB" class="btn-vote btn-vote-B"><i class="fas fa-moon"></i> ${CANDIDATES.B}</button>
                </div>
            `;
        }

        const html = `
            <div class="dashboard">
                <div class="voters-card">
                    <div class="card-header">
                        <h2><i class="fas fa-users"></i> Oy Verenler (gizli)</h2>
                    </div>
                    <div id="voterList" class="voter-list"></div>
                </div>
                <div class="chart-card">
                    <h3><i class="fas fa-chart-simple"></i> Açıklanan Sonuçlar</h3>
                    <div class="percentage-stats">
                        <div class="stat">${CANDIDATES.A}: <span id="percentA">0</span>%</div>
                        <div class="stat">${CANDIDATES.B}: <span id="percentB">0</span>%</div>
                    </div>
                    <div class="canvas-container">
                        <canvas id="voteChart"></canvas>
                    </div>
                    <div style="text-align:center; margin-top:0.5rem;">Açıklanan oy: <span id="totalRevealedVotes">0</span></div>
                </div>
            </div>
            <div class="login-panel">
                <div><i class="fab fa-discord"></i> <strong>${escapeHtml(user.username)}#${user.discriminator}</strong> (Sandık ${sandikNo})</div>
                ${oyKullanmaHtml}
                <button onclick="logout()" class="btn-discord" style="background:#475569;"><i class="fas fa-sign-out-alt"></i> Çıkış Yap</button>
            </div>
            <div id="adminPanel" class="admin-panel" style="display: ${user.id === ADMIN_ID ? 'block' : 'none'};"></div>
        `;
        document.getElementById('mainContent').innerHTML = html;
        updateUI();

        if (!alreadyVoted && !countingStarted) {
            document.getElementById('voteA')?.addEventListener('click', () => {
                if (addVote(user.id, user.username, "A", sandikNo)) showVotingPanel(user);
            });
            document.getElementById('voteB')?.addEventListener('click', () => {
                if (addVote(user.id, user.username, "B", sandikNo)) showVotingPanel(user);
            });
        }
        if (user.id === ADMIN_ID) renderAdminPanel(user);
    }

    // ------------------- GİRİŞ -------------------
    function showLoginScreen() {
        document.getElementById('mainContent').innerHTML = `
            <div class="login-panel">
                <h2><i class="fab fa-discord"></i> Discord ile Giriş Yap</h2>
                <p style="margin: 1rem 0;">Sadece sandık üyeleri oy kullanabilir.</p>
                <button onclick="loginWithDiscord()" class="btn-discord"><i class="fab fa-discord"></i> Discord ile Giriş</button>
            </div>
        `;
    }
    function showUnauthorized() {
        document.getElementById('mainContent').innerHTML = `
            <div class="login-panel">
                <i class="fas fa-ban" style="font-size:3rem; color:#ef4444;"></i>
                <h2>Erişim Engellendi</h2>
                <p>Bu sunucunun üyesi değilsiniz.</p>
                <button onclick="logout()" class="btn-discord">Tekrar Dene</button>
            </div>
        `;
    }

    function getDiscordUser(callback) {
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const accessToken = params.get('access_token');
        if (!accessToken) { callback(null); return; }
        fetch('https://discord.com/api/users/@me', {
            headers: { Authorization: `Bearer ${accessToken}` }
        })
        .then(res => res.json())
        .then(user => { if (user.id) callback(user); else callback(null); })
        .catch(() => callback(null));
    }
    function loginWithDiscord() {
        const authUrl = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=identify`;
        window.location.href = authUrl;
    }
    function logout() {
        window.location.href = window.location.pathname;
    }

    function init() {
        getDiscordUser(user => {
            if (!user) { showLoginScreen(); return; }
            if (!ALLOWED_USER_IDS.includes(user.id)) { showUnauthorized(); return; }
            document.getElementById('userStatus').innerHTML = `<i class="fab fa-discord"></i> ${escapeHtml(user.username)}#${user.discriminator}`;
            showVotingPanel(user);
        });
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
    }

    init();
</script>
</body>
